<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
                <div class="card">

                     <div class="table-responsive">
                    <table class="table table-light table-hover table-bordered">
                      <thead class="table-dark">
                        <tr>
                          <th> Category Name </th>
                          <th> Description </th>
                          <th> Category Image </th>
                          <th> Option </th>
                        </tr>
                      </thead>
                        {% for i in category %}
                      <tbody>
                        <tr>
                            <td>{{i.Category_name}}</td>
                            <td style="min-width:200px;word-wrap:break-word;white-space:normal;">{{i.Description}}</td>
                            <td><img src="{{i.Category_images.url}}" width="100px" height="100px"></td>
                            <td>
                                <a href=" {% url 'edit_category' cat_id=i.id %} ">
                                    <button type="submit" class="btn btn-gradient-success me-2">Edit</button>
                                </a>
                                <a href=" {% url 'delete_category' cat_id=i.id %} ">
                                    <button type="submit" class="btn btn-gradient-danger me-2">Delete</button>
                                </a>
                            </td>
                        </tr>
                      </tbody>
                        {% endfor %}
                    </table>

                 </div>
                </div>
              </div>
</body>
</html>
{% endblock %}
