<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
                <div class="card">

                     <div class="table-responsive">
                    <table class="table table-light table-hover table-bordered">
                      <thead class="table-dark">
                        <tr style="text-align:center">
                          <th> Category Name </th>
                          <th> Product Name</th>
                          <th> Author </th>
                          <th> Price</th>
                          <th> Overview</th>
                          <th> Product img</th>
                          <th> Options </th>
                        </tr>
                      </thead>
                        {% for i in product %}
                      <tbody>
                        <tr style="text-align:center">
                            <td>{{i.CategoryName}}</td>
                            <td>{{i.Product_Name}}</td>
                            <td>{{i.Author_Name}}</td>
                            <td>{{i.Price}}</td>
                            <td style="min-width:500px;word-wrap:break-word;white-space:normal;">{{i.Overview}}</td>
                            <td><img src="{{i.Product_img.url}}" width="100px" height="100px"></td>
                            <td>
                                <a href=" {% url 'edit_product' pro_id=i.id %} ">
                                    <button type="submit" class="btn btn-gradient-success me-2">Edit</button>
                                </a>
                                <a href=" {% url 'delete_product' pro_id=i.id %} ">
                                    <button type="submit" class="btn btn-gradient-danger me-2">Delete</button>
                                </a>
                            </td>
                        </tr>
                      </tbody>
                        {% endfor %}
                    </table>

                 </div>
                </div>
              </div>
</body>
</html>
{% endblock %}
